name: Generate Daily Report

on:
  schedule:
    - cron: '0 14 * * *'  # 北京时间 22:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'gop-book'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Fetch content from multiple sources
        id: fetch
        env:
          FOLO_COOKIE: ${{ secrets.FOLO_COOKIE }}
          FOLO_API: "https://api.follow.is/entries"
          LIST_ID: ${{ vars.FOLO_LIST_ID || '158437828119024640' }}
        run: |
          echo "正在获取内容..."
          mkdir -p temp

          # 1. 尝试从 Folo 获取内容（如果有 Cookie）
          if [ -n "$FOLO_COOKIE" ]; then
            echo "从 Folo 获取内容..."
            RESPONSE=$(curl -s -X POST "$FOLO_API" \
              -H "Content-Type: application/json" \
              -H "Cookie: $FOLO_COOKIE" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -d "{\"listId\":\"$LIST_ID\",\"view\":1,\"withContent\":true}")
            echo "$RESPONSE" > temp/folo_response.json
          fi

          # 2. 从 GitHub Trending 获取内容（公开 API，无需认证）
          echo "从 GitHub Trending 获取内容..."
          TRENDING_RESPONSE=$(curl -s "https://api.github.com/repos?q=ai+language:python&sort=stars&order=desc&per_page=10" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: GitHub-Actions")
          echo "$TRENDING_RESPONSE" > temp/github_trending.json

          # 3. 从 Hacker News 获取内容（公开 API）
          echo "从 Hacker News 获取内容..."
          HN_RESPONSE=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json")
          HN_IDS=$(echo "$HN_RESPONSE" | node -e 'const ids = JSON.parse(require("fs").readFileSync(0, "utf8")).slice(0, 10); console.log(ids.join(" "));')

          echo "[" > temp/hackernews.json
          first=true
          for id in $HN_IDS; do
            ITEM=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json")
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> temp/hackernews.json
            fi
            echo "$ITEM" >> temp/hackernews.json
          done
          echo "]" >> temp/hackernews.json

          # 合并内容
          node -e '
            const fs = require("fs");
            let content = "";

            // GitHub Trending
            try {
              const gh = JSON.parse(fs.readFileSync("temp/github_trending.json", "utf8"));
              if (gh.items && gh.items.length > 0) {
                content += "\n## GitHub 热门 AI 项目\n\n";
                gh.items.slice(0, 5).forEach((repo, i) => {
                  content += `### ${i + 1}. ${repo.full_name}\n`;
                  content += `**描述**: ${repo.description || "无描述"}\n`;
                  content += `**Stars**: ${repo.stargazers_count} | **语言**: ${repo.language || "未知"}\n`;
                  content += `[查看项目](https://github.com/${repo.full_name})\n\n---\n`;
                });
              }
            } catch (e) {}

            // Hacker News
            try {
              const hn = JSON.parse(fs.readFileSync("temp/hackernews.json", "utf8"));
              const validHn = hn.filter(item => item && item.title);
              if (validHn.length > 0) {
                content += "\n## Hacker News 热门\n\n";
                validHn.slice(0, 5).forEach((item, i) => {
                  content += `### ${i + 1}. ${item.title}\n`;
                  content += `**分数**: ${item.score || 0} | **评论**: ${item.descendants || 0}\n`;
                  if (item.url) content += `[阅读原文](${item.url})\n`;
                  content += `[HN 讨论](https://news.ycombinator.com/item?id=${item.id})\n\n---\n`;
                });
              }
            } catch (e) {}

            // Folo（如果有）
            try {
              const folo = JSON.parse(fs.readFileSync("temp/folo_response.json", "utf8"));
              if (folo.data && folo.data.length > 0) {
                content += "\n## Folo 订阅\n\n";
                folo.data.slice(0, 5).forEach((entry, i) => {
                  const title = entry.entries?.title || "无标题";
                  const url = entry.entries?.url || "";
                  const author = entry.entries?.author || entry.feeds?.title || "未知";
                  content += `### ${i + 1}. ${title}\n`;
                  content += `**来源**: ${author}\n`;
                  if (url) content += `[阅读原文](${url})\n`;
                  content += "\n---\n";
                });
              }
            } catch (e) {}

            if (content.trim()) {
              fs.writeFileSync("temp/content.txt", content);
              console.log("成功获取内容");
            } else {
              console.log("没有获取到内容");
            }
          '

          echo "content=$(cat temp/content.txt 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Generate summary with AI
        id: ai
        if: steps.fetch.outputs.content != ''
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          echo "正在调用 AI 生成摘要..."

          CONTENT=$(cat temp/content.txt)

          # 构建 prompt
          PROMPT="你是一名专业的AI资讯编辑。请根据以下内容生成一份AI日报摘要，要求：
          1. 用通俗易懂的语言总结
          2. 提炼每条资讯的核心要点
          3. 保持专业但不失趣味性
          4. 使用 Markdown 格式

          原始内容：
          $CONTENT"

          # 调用 AI API (OpenAI 兼容格式)
          RESPONSE=$(curl -s -X POST "${AI_API_URL}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -d "{
              \"model\": \"$AI_MODEL\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"你是一名专业的AI资讯编辑，擅长用通俗易懂的语言总结科技资讯。\"},
                {\"role\": \"user\", \"content\": \"$PROMPT\"}
              ],
              \"max_tokens\": 4000,
              \"temperature\": 0.7
            }")

          # 提取 AI 回复
          SUMMARY=$(echo "$RESPONSE" | node -e '
            const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(data.choices?.[0]?.message?.content || "AI 生成失败");
          ')

          echo "$SUMMARY" > temp/summary.txt
          echo "summary_file=temp/summary.txt" >> $GITHUB_OUTPUT

      - name: Create daily markdown file
        if: steps.ai.outputs.summary_file != ''
        run: |
          echo "正在创建日报文件..."

          mkdir -p daily

          DATE=${{ steps.date.outputs.date }}
          SUMMARY=$(cat temp/summary.txt)

          cat > daily/${DATE}.md << EOF
          # AI 洞察日报 - ${DATE}

          > 自动生成于 $(date "+%Y-%m-%d %H:%M:%S")

          ---

          ${SUMMARY}

          ---

          *本日报由 GitHub Actions 自动生成*
          EOF

          echo "日报文件已创建: daily/${DATE}.md"

      - name: Send to WPS IM Robot
        if: steps.ai.outputs.summary_file != ''
        env:
          WPS_WEBHOOK_URL: ${{ secrets.WPS_WEBHOOK_URL }}
        run: |
          # 检查是否配置了 Webhook
          if [ -z "$WPS_WEBHOOK_URL" ]; then
            echo "⚠️ WPS_WEBHOOK_URL 未配置，跳过推送"
            exit 0
          fi

          echo "正在推送到 WPS 协作机器人..."

          DATE=${{ steps.date.outputs.date }}
          SUMMARY=$(cat temp/summary.txt | head -c 3500)

          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$WPS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"text\",
              \"content\": {
                \"text\": \"📰 AI洞察日报 - ${DATE}\\n\\n${SUMMARY}\"
              }
            }")

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ 日报已成功推送到 WPS 协作机器人"
          else
            echo "❌ 推送失败，HTTP 状态码: $HTTP_CODE"
            cat response.txt
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ -d "daily" ]; then
            git add daily/
          fi

          if git diff --staged --quiet; then
            echo "没有文件变更，无需提交。"
          else
            echo "检测到文件变更，正在提交..."
            git commit -m "docs: 自动生成日报 ${{ steps.date.outputs.date }}"
            git push
          fi

      - name: Cleanup
        run: rm -rf temp
