name: Build Daily Journal

on:
  # 每天UTC时间14点自动触发 (对应北京时间晚上22点)
  schedule:
    - cron: '0 14 * * *'
    
  # 手动触发
  workflow_dispatch:
  
jobs:
  build-book:
    runs-on: ubuntu-latest
      
    # 需要写入权限来提交生成的文件和归档的日刊
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 明确指定要检出的分支
          ref: 'book' # <-- 请将 'book' 替换为你的目标分支名

      - name: Archive old notes
        id: archive
        run: |
          echo "开始检查并归档旧的日刊..."
          # 查找最新文件以确定当前月份
          LATEST_DAILY_FILE=$(find daily -type f -name "*.md" | sort -r | head -n 1)
          if [ -z "$LATEST_DAILY_FILE" ]; then
            echo "在 'daily' 目录中没有找到任何 .md 文件，跳过归档步骤。"
            exit 0
          fi
          
          LATEST_MONTH=$(basename "$LATEST_DAILY_FILE" .md | cut -d'-' -f1,2)
          echo "当前最新月份是: $LATEST_MONTH"

          # 仅遍历 daily/ 根目录下的 md 文件进行归档
          for file in daily/*.md; do
            # 如果根目录下没有md文件，循环会匹配到 "daily/*.md" 字符串，需要跳过
            [ -e "$file" ] || continue
            
            FILE_MONTH=$(basename "$file" .md | cut -d'-' -f1,2)
            
            if [ "$FILE_MONTH" != "$LATEST_MONTH" ]; then
              TARGET_DIR="daily/$FILE_MONTH"
              mkdir -p "$TARGET_DIR"
              echo "归档文件: $file -> $TARGET_DIR/"
              mv "$file" "$TARGET_DIR/"
            fi
          done
          echo "文件归档检查完成。"

      - name: Trigger RSS Data Write (2 attempts, 3 retries each)
        run: |
          # 检查 `WRITE_RSS_URL` 变量是否已设置
          if [ -z "${{ vars.WRITE_RSS_URL }}" ]; then
            echo "警告: WRITE_RSS_URL 仓库变量未设置或为空，跳过此步骤。"
            exit 0
          fi

          # 设置时区为 Asia/Shanghai (东八区)，并获取 YYYY-MM-DD 格式的日期
          TODAY_DATE=$(TZ="Asia/Shanghai" date +%Y-%m-%d)
          FULL_URL="${{ vars.WRITE_RSS_URL }}?date=$TODAY_DATE"
          
          echo "将向以下 URL 发送2次请求（每次请求若失败则重试3次）:"
          echo "$FULL_URL"
          
          # 循环两次，发送两次独立的请求
          for i in 1 2
          do
            echo "---"
            echo "正在发送第 $i 次请求..."
            
            # 使用 curl 发起请求，并配置重试逻辑
            # -f: 在遇到服务器HTTP错误时，以错误码退出（对CI/CD很重要）
            # -sS: 静默模式，但仍然显示错误信息
            # --retry 3: 如果命令失败，则最多重试3次
            # --retry-delay 5: 每次重试之间等待5秒
            # --retry-connrefused: 在“连接被拒绝”时也进行重试，增强网络抖动的鲁棒性
            if curl -fsS --retry 3 --retry-delay 5 --retry-connrefused "$FULL_URL"; then
              echo "第 $i 次请求成功。"
            else
              echo "错误：第 $i 次请求在3次重试后仍然失败。"
              # 使整个步骤失败
              exit 1
            fi
          done
          
          echo "---"
          echo "两次请求均已成功发送。"
          
      - name: Download RSS Feed
        run: |
          if [ -z "${{ vars.RSS_FEED_URL }}" ]; then
            echo "警告: RSS_FEED_URL 仓库变量未设置或为空，跳过下载。"
          else
            echo "正在从 ${{ vars.RSS_FEED_URL }} 下载 RSS Feed..."
            if wget -O rss.xml "${{ vars.RSS_FEED_URL }}" --timeout=30 --tries=3; then
              echo "RSS Feed 已成功下载到 rss.xml"
            else
              echo "错误: 下载 RSS Feed 失败。wget 返回错误码 $?。"
            fi
          fi
          
      - name: Send Daily to WPS IM Robot
        env:
          WPS_WEBHOOK_URL: ${{ secrets.WPS_WEBHOOK_URL }}
        run: |
          # 检查是否配置了 Webhook URL
          if [ -z "$WPS_WEBHOOK_URL" ]; then
            echo "⚠️ WPS_WEBHOOK_URL 未配置，跳过推送"
            exit 0
          fi

          echo "正在推送日报到 WPS 协作机器人..."

          # 获取今日日期
          TODAY_DATE=$(TZ="Asia/Shanghai" date +%Y-%m-%d)

          # 尝试从 daily 目录读取今日日报
          DAILY_FILE="daily/${TODAY_DATE}.md"

          if [ -f "$DAILY_FILE" ]; then
            echo "找到今日日报文件: $DAILY_FILE"

            # 读取日报内容并转义 JSON 特殊字符
            DAILY_CONTENT=$(cat "$DAILY_FILE" | sed 's/"/\\"/g' | sed 's/\n/\\n/g' | head -c 3500)

            # 发送到 WPS Webhook
            HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$WPS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"msg_type\": \"text\",
                \"content\": {
                  \"text\": \"📰 AI洞察日报 - ${TODAY_DATE}\\n\\n${DAILY_CONTENT}\"
                }
              }")

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ 日报已成功推送到 WPS 协作机器人"
            else
              echo "❌ 推送失败，HTTP 状态码: $HTTP_CODE"
              cat response.txt
            fi
          else
            echo "未找到今日日报文件: $DAILY_FILE"
            echo "尝试从最新文件读取..."

            # 查找最新的日报文件
            LATEST_FILE=$(find daily -type f -name "*.md" ! -path "daily/*/*" | sort -r | head -n 1)

            if [ -n "$LATEST_FILE" ] && [ -f "$LATEST_FILE" ]; then
              echo "找到最新日报: $LATEST_FILE"
              DAILY_CONTENT=$(cat "$LATEST_FILE" | sed 's/"/\\"/g' | sed 's/\n/\\n/g' | head -c 3500)

              curl -s -X POST "$WPS_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{
                  \"msg_type\": \"text\",
                  \"content\": {
                    \"text\": \"📰 AI洞察日报\\n\\n${DAILY_CONTENT}\"
                  }
                }"
              echo "✅ 已推送最新日报到 WPS 协作机器人"
            else
              echo "❌ 未找到任何日报文件，跳过推送"
            fi
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 检查目录是否存在再添加
          if [ -d "today" ]; then
            git add today/
          fi

          if [ -d "daily" ]; then
            git add daily/
          fi

          if [ -f "rss.xml" ]; then
            git add rss.xml
          fi

          if git diff --staged --quiet; then
            echo "没有文件变更，无需提交。"
          else
            echo "检测到文件变更，正在提交..."
            git commit -m "docs: 自动构建日刊并归档旧月份 (`date -u`)"
            git push
          fi
